  - https://about.underarmour.com/en/contact/
limits:
  - name: Contract-Defined Limit
    scope: contract
    metric: varies
    limit: see partner agreement
    notes: Throughput, quota, and burst limits are agreed inside the partner integration contract.
policies:
  - name: Contractual Governance
    description: Operational limits are specified inside the retail / wholesale / commerce integration
      contract rather than a public rate-limits page.
