    name: MapMyFitness API
    tags:
      - Fitness
      - Workouts
      - Routes
      - Health
      - Connected Fitness
      - OAuth2
    image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    baseURL: https://api.ua.com
    humanURL: https://developer.mapmyfitness.com/
    properties:
      - url: https://developer.mapmyfitness.com/docs/
        type: Documentation
      - url: https://developer.mapmyfitness.com/docs/v71_OAuth_2_Intro/
        type: Authentication
      - url: openapi/mapmyfitness-openapi.yml
        type: OpenAPI
    description: >-
      The MapMyFitness API (Under Armour Connected Fitness API) provides
      RESTful access to fitness data including workouts, routes, user profiles,
      heart rate zones, fitness devices, and webhooks. The platform powers
      MapMyFitness, MapMyRun, MapMyRide, and MapMyWalk and supports over 400
      partner apps and devices. Authentication uses OAuth 2.0.
