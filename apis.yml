aid: under-armour
name: Under Armour
description: >-
  Under Armour is an American company that manufactures footwear, sports, and
  casual apparel known for its performance products designed for athletes. Under
  Armour operates a Connected Fitness platform — powered by MapMyFitness — that
  provides developer APIs for integrating workout tracking, route data, user
  profiles, heart rate zones, and fitness devices into third-party applications.
url: https://raw.githubusercontent.com/api-evangelist/under-armour/refs/heads/main/apis.yml
type: Index
