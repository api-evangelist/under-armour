description: Under Armour does not currently operate a public connected-fitness developer program with
  published pricing. The historical MapMyFitness / MyFitnessPal partner APIs were divested or sunset;
  remaining commerce, partner, and supply-chain integrations are negotiated B2B.
notes: under-armour corporate site fetch returned a 404-style page; no public developer portal could
  be located. Trimmed to a single Contact Sales plan.
sources:
