principles:
  - name: Visibility
    description: Reconcile spend from partner-contract statements; Under Armour does not expose a public
      usage telemetry surface.
  - name: Allocation
    description: Allocate to the consuming line of business (DTC, wholesale, sponsorship) per the contract
      scope.
  - name: Optimization
    description: Re-scope contract on renewal based on actual order / data volume; consolidate retail
      partner connections where possible.
  - name: Accountability
    description: Commerce / partner-management owners review contract performance and renewal terms.
